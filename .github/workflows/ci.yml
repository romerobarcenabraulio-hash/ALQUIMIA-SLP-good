# CI mínimo ALQUIMIA — tipos frontend, pytest backend, ripgrep instalado (phase-rules / Auditor)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alquimia
          POSTGRES_PASSWORD: alquimia
          POSTGRES_DB: alquimia
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://alquimia:alquimia@localhost:5432/alquimia
      SECRET_KEY: ci-secret-key-not-for-production
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep (portabilidad auto_check phase-rules/22.x.yaml)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Verify ripgrep
        run: command -v rg && rg --version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend — venv, deps, migrate, pytest
        run: |
          cd backend
          python -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/alembic upgrade head
          .venv/bin/python -m pytest tests/ -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — npm ci, TypeScript, Vitest
        run: |
          cd frontend
          npm ci
          node node_modules/typescript/bin/tsc --noEmit
          npm test -- --run

      - name: EIDOS terminology check
        run: python scripts/eidos_check_docs.py

  # Lighthouse Accessibility + perf sobre export estático; no bloquea merge si Chromium/serve fallan en runner.
  lighthouse-artifact-optional:
    runs-on: ubuntu-latest
    needs: checks
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Chromium for Lighthouse
        run: sudo apt-get update && sudo apt-get install -y chromium-browser

      - name: Build static export and run Lighthouse CI
        env:
          CHROME_PATH: /usr/bin/chromium-browser
        working-directory: frontend
        run: |
          npm ci
          npm run audit:lighthouse:ci

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-simulator-reports
          path: frontend/audit_reports/
