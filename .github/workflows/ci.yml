# CI ALQUIMIA — atrapa en GitHub Actions lo que rompería Vercel o Render
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. No symlinks rotos en public/ ──────────────────────────────
      - name: Verify no broken symlinks in frontend/public
        run: |
          broken=$(find frontend/public -type l ! -exec test -e {} \; -print)
          if [ -n "$broken" ]; then
            echo "❌ Symlinks rotos en public/:"
            echo "$broken"
            exit 1
          fi
          echo "✅ Sin symlinks rotos en public/"

      # ── 2. .next/ no está trackeado en git ───────────────────────────
      - name: Verify .next/ not tracked in git
        run: |
          tracked=$(git ls-files frontend/.next/ | head -5)
          if [ -n "$tracked" ]; then
            echo "❌ frontend/.next/ está en git — agregar a .gitignore"
            echo "$tracked"
            exit 1
          fi
          echo "✅ frontend/.next/ no trackeado"

      # ── 3. Backend — instalar, pytest ────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend — venv, deps, pytest
        run: |
          cd backend
          python -m venv .venv
          .venv/bin/pip install -U pip -q
          .venv/bin/pip install -r requirements.txt -q
          .venv/bin/python -m pytest tests/ -q

      # ── 4. Frontend — TypeScript y build ─────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — npm ci + tsc
        run: |
          cd frontend
          npm ci --prefer-offline
          node node_modules/typescript/bin/tsc --noEmit

      - name: Frontend — next build (smoke test)
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://alquimia-slp.onrender.com

  # Lighthouse opcional — no bloquea merge
  lighthouse-optional:
    runs-on: ubuntu-latest
    needs: checks
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Chromium
        run: sudo apt-get update -qq && sudo apt-get install -y chromium-browser
      - name: Lighthouse CI
        env:
          CHROME_PATH: /usr/bin/chromium-browser
          NEXT_PUBLIC_API_URL: https://alquimia-slp.onrender.com
        working-directory: frontend
        run: |
          npm ci --prefer-offline
          npm run audit:lighthouse:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: frontend/audit_reports/
