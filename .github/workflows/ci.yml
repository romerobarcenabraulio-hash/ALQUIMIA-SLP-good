# CI mínimo ALQUIMIA — tipos frontend, pytest backend, ripgrep instalado (phase-rules / Auditor)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep (portabilidad auto_check phase-rules/22.x.yaml)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Verify ripgrep
        run: command -v rg && rg --version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend — venv, deps, pytest
        run: |
          cd backend
          python -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/python -m pytest tests/ -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — npm ci, TypeScript
        run: |
          cd frontend
          npm ci
          node node_modules/typescript/bin/tsc --noEmit
