[pytest]
# Registra marcadores personalizados para suprimir PytestUnknownMarkWarning
markers =
    asyncio: mark test as async (requires pytest-asyncio)
    integration: mark test as integration (may require external services)
    slow: mark test as slow (may be skipped in fast CI)

# Ignora los archivos que sólo funcionan con dependencias opcionales no instaladas
# (pydantic_settings / pytest_asyncio). En entornos con las dependencias, estos
# tests sí corren porque el import funciona antes de la colección.
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
