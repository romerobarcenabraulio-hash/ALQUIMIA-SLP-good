# alembic.ini — Configuración de Alembic para ALQUIMIA backend
# Documentación: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Ruta al directorio de migraciones (relativa a este archivo)
script_location = alembic

# Plantilla para nombres de archivos de revisión
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Directorio para archivos .pyc de Alembic
prepend_sys_path = .

# Versión de la API de Alembic usada en env.py
version_path_separator = os

# DATABASE_URL — Alembic la lee del config, pero env.py la sobreescribe
# con la variable de entorno DATABASE_URL para no exponer credenciales aquí.
# No definir sqlalchemy.url aquí; se resuelve dinámicamente en env.py.
# sqlalchemy.url = postgresql://user:pass@localhost/alquimia

[post_write_hooks]
# Sin hooks adicionales

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
